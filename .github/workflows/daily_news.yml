name: 每日客訴新聞郵件

on:
  schedule:
    # 台灣時間早上 8:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:   # 允許在 GitHub 網頁上手動觸發（方便測試）

jobs:
  send-news-email:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # 允許自動 commit（保活用）

    steps:
      - name: 取得程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 安裝套件
        run: pip install feedparser

      - name: 執行新聞抓取與寄信
        env:
          SENDER_EMAIL:    ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL:  ${{ secrets.RECEIVER_EMAIL }}
        run: python fetch_news.py

      - name: 自動保活 commit（每月1日執行）
        if: ${{ github.event.schedule == '0 0 * * *' && startsWith(github.run_id, '') }}
        run: |
          DAY=$(date +%d)
          if [ "$DAY" = "01" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            echo "Keep-alive: $(date '+%Y-%m')" > .keep-alive
            git add .keep-alive
            git commit -m "chore: keep-alive $(date '+%Y-%m')" || echo "Nothing to commit"
            git push
          fi
